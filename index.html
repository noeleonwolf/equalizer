<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dot Equalizer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0ede8;--surface:#fff;--surface2:#f5f3ef;
  --border:rgba(0,0,0,.08);--border-s:rgba(0,0,0,.18);
  --text:#1a1814;--muted:#8a8680;--faint:#bab8b4;--accent:#1a1814;
  --sans:'DM Sans',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111010;--surface:#1c1b1a;--surface2:#252422;
  --border:rgba(255,255,255,.07);--border-s:rgba(255,255,255,.18);
  --text:#edecea;--muted:#6e6c69;--faint:#3a3836;--accent:#edecea;
}}
html,body{min-height:100vh;background:var(--bg);font-family:var(--sans);color:var(--text);-webkit-font-smoothing:antialiased;}
body{display:flex;align-items:flex-start;justify-content:center;padding:2.5rem 1.5rem 4rem;}
.card{width:100%;max-width:800px;background:var(--surface);border-radius:22px;border:.5px solid var(--border);padding:2rem;display:flex;flex-direction:column;gap:1.25rem;}
.header{display:flex;align-items:baseline;gap:10px;}
.header h1{font-size:17px;font-weight:500;letter-spacing:-.02em;}
.header span{font-family:var(--mono);font-size:11px;font-weight:300;color:var(--muted);}
hr{border:none;border-top:.5px solid var(--border);}
.two-col{display:flex;gap:2rem;flex-wrap:wrap;}
.col{display:flex;flex-direction:column;gap:8px;flex:1;min-width:180px;}
.slabel{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
.sinput{width:100%;font-family:var(--sans);font-size:13px;padding:7px 11px;border-radius:6px;border:.5px solid var(--border-s);background:var(--surface2);color:var(--text);outline:none;}
.sinput::placeholder{color:var(--faint);}
.cats{display:flex;gap:5px;flex-wrap:wrap;}
.cb{padding:3px 10px;font-family:var(--sans);font-size:11px;border-radius:20px;border:.5px solid var(--border-s);background:transparent;color:var(--muted);cursor:pointer;}
.cb.on{background:var(--accent);color:var(--surface);border-color:var(--accent);}
.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:4px;max-height:180px;overflow-y:auto;padding:2px;}
.igrid::-webkit-scrollbar{width:3px;}
.igrid::-webkit-scrollbar-thumb{background:var(--border-s);border-radius:2px;}
.tile{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px 6px;border-radius:6px;border:.5px solid transparent;cursor:pointer;}
.tile:hover{background:var(--surface2);border-color:var(--border-s);}
.tile.sel{background:var(--surface2);border-color:var(--muted);}
.tile svg{width:20px;height:20px;fill:var(--text);}
.tile span{font-size:10px;color:var(--faint);text-align:center;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono);}
.nores{font-size:12px;color:var(--faint);padding:1rem;text-align:center;grid-column:1/-1;}
.sbar{display:flex;align-items:center;gap:9px;padding:6px 11px;border-radius:6px;background:var(--surface2);border:.5px solid var(--border);}
.sbar svg{width:16px;height:16px;fill:var(--text);flex-shrink:0;}
.sl{font-size:12px;color:var(--muted);font-family:var(--mono);}
.sn{font-size:12px;font-weight:500;color:var(--text);font-family:var(--mono);}
.presets{display:flex;gap:6px;flex-wrap:wrap;}
.pbtn{padding:5px 13px;font-family:var(--sans);font-size:12px;border-radius:6px;border:.5px solid var(--border-s);background:transparent;color:var(--muted);cursor:pointer;}
.pbtn.on{background:var(--accent);color:var(--surface);border-color:var(--accent);}
.ctrls{display:flex;gap:1.25rem;flex-wrap:wrap;align-items:center;}
.ctl{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);font-family:var(--mono);}
.ctl b{min-width:22px;font-weight:400;font-size:12px;color:var(--text);}
input[type=range]{-webkit-appearance:none;height:3px;background:var(--border-s);border-radius:2px;outline:none;width:80px;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--text);cursor:pointer;}
select{font-family:var(--mono);font-size:12px;padding:4px 8px;border-radius:6px;border:.5px solid var(--border-s);background:var(--surface2);color:var(--text);cursor:pointer;outline:none;}
.cwrap{border-radius:16px;border:.5px solid var(--border);background:var(--surface2);overflow:hidden;}
canvas{display:block;width:100%;}
.actions{display:flex;gap:8px;flex-wrap:wrap;}
.action-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;font-size:12px;font-family:var(--sans);border-radius:8px;border:.5px solid var(--border-s);background:transparent;color:var(--text);cursor:pointer;transition:background .12s;}
.action-btn:hover{background:var(--surface2);}
.action-btn.paused{background:var(--accent);color:var(--surface);border-color:var(--accent);}
.action-btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0;}
.footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.fnote{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.04em;}
@media(max-width:520px){body{padding:1rem .75rem 3rem;}.card{padding:1.25rem;}.two-col{gap:1.25rem;}}
</style>
</head>
<body>
<div class="card">
  <div class="header"><h1>Dot Equalizer</h1><span>icon shape animator</span></div>
  <hr>
  <div class="two-col">
    <div class="col">
      <div class="slabel">Icon shape</div>
      <input class="sinput" id="q" placeholder="Search — music, home, star…" autocomplete="off">
      <div class="cats" id="cats"></div>
      <div class="igrid" id="grid"></div>
      <div class="sbar">
        <svg viewBox="0 0 24 24"><path id="sbPath"/></svg>
        <span class="sl">shape /</span><span class="sn" id="sbName">equalizer</span>
      </div>
    </div>
    <div class="col">
      <div class="slabel">Preset feel</div>
      <div class="presets" id="presets"></div>
    </div>
  </div>
  <hr>
  <div class="ctrls">
    <div class="ctl">speed<input type="range" min="1" max="10" value="5" step="1" id="iSp"><b id="vSp">5</b></div>
    <div class="ctl">dot size<input type="range" min="2" max="10" value="5" step="1" id="iDs"><b id="vDs">5</b></div>
    <div class="ctl">columns<input type="range" min="6" max="40" value="22" step="1" id="iCo"><b id="vCo">22</b></div>
    <div class="ctl">color
      <select id="iCl">
        <option value="auto">auto</option>
        <option value="#D85A30">coral</option>
        <option value="#378ADD">blue</option>
        <option value="#1D9E75">teal</option>
        <option value="#EF9F27">amber</option>
        <option value="#7F77DD">purple</option>
      </select>
    </div>
  </div>
  <div class="cwrap"><canvas id="cv"></canvas></div>
  <div class="actions">
    <button class="action-btn" id="pauseBtn">
      <svg id="pauseIcon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      <span id="pauseLabel">Pause</span>
    </button>
    <button class="action-btn" id="exportBtn">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5v-2z"/></svg>
      Export SVG
    </button>
  </div>
  <div class="footer">
    <span class="fnote">dot equalizer — icon shape animator</span>
    <span class="fnote" id="fps"></span>
  </div>
</div>

    {n:'cross',p:'M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z'},
    {n:'arrow up',p:'M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z'},
  ],
};
const PRESETS={
  'Calm':{sp:2,base:[0.3,0.5,0.4,0.35,0.45,0.3]},
  'Bounce':{sp:7,base:[1,0.8,1.2,0.9,1.1,0.7]},
  'Bass':{sp:4,base:[0.8,0.6,0.4,0.3,0.25,0.2]},
  'Treble':{sp:6,base:[0.2,0.3,0.5,0.7,0.9,1.1]},
  'Random':{sp:5,base:null},
};
const ALL=Object.entries(ICONS).flatMap(([cat,arr])=>arr.map(i=>({...i,cat})));
const CATS=['all',...Object.keys(ICONS)];
let sel=ALL[0],cat='all',q='';
let cols=22,ds=5,sp=5,clr='auto';
let freqs=[],t=0,paused=false;
let maskData=null,maskW=0,maskH=0;
let fpsF=0,fpsT=performance.now();

function filtered(){const sq=q.trim().toLowerCase();return ALL.filter(i=>(cat==='all'||i.cat===cat)&&(!sq||i.n.includes(sq)||i.cat.includes(sq)));}
function mkSvg(path){const s=document.createElementNS('http://www.w3.org/2000/svg','svg');s.setAttribute('viewBox','0 0 24 24');s.style.cssText='width:20px;height:20px;fill:currentColor;flex-shrink:0;';const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',path);s.appendChild(p);return s;}

function renderGrid(){
  const g=document.getElementById('grid');
  const list=filtered();g.innerHTML='';
  if(!list.length){g.innerHTML='<div class="nores">No icons found</div>';return;}
  list.forEach(icon=>{
    const d=document.createElement('div');
    d.className='tile'+(icon.n===sel.n?' sel':'');
    d.appendChild(mkSvg(icon.p));
    const lb=document.createElement('span');lb.textContent=icon.n;d.appendChild(lb);
    d.onclick=()=>{sel=icon;renderGrid();updateBar();buildMask();};
    g.appendChild(d);
  });
}
function updateBar(){document.getElementById('sbName').textContent=sel.n;document.getElementById('sbPath').setAttribute('d',sel.p);}
function renderCats(){
  const r=document.getElementById('cats');
  CATS.forEach(c=>{
    const b=document.createElement('button');b.className='cb'+(c===cat?' on':'');b.textContent=c;
    b.onclick=()=>{cat=c;document.querySelectorAll('.cb').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderGrid();};
    r.appendChild(b);
  });
}
function renderPresets(){
  const r=document.getElementById('presets');
  Object.entries(PRESETS).forEach(([name,preset])=>{
    const b=document.createElement('button');b.className='pbtn';b.textContent=name;
    b.onclick=()=>{document.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');if(preset.sp){sp=preset.sp;document.getElementById('iSp').value=sp;document.getElementById('vSp').textContent=sp;}initF(preset.base);};
    r.appendChild(b);
  });
}

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d',{willReadFrequently:true});

function buildMask(){
  const W=cv.width,H=cv.height;
  const S=4,mW=W*S,mH=H*S;
  const pad=24,size=Math.round(Math.min(W-pad*2,H-pad*2)*0.92);
  const ox=Math.round((W-size)/2),oy=Math.round((H-size)/2),sc=size/24;
  const oc=document.createElement('canvas');
  oc.width=mW;oc.height=mH;
  const oc2=oc.getContext('2d',{willReadFrequently:true});
  oc2.fillStyle='white';oc2.fillRect(0,0,mW,mH);
  oc2.fillStyle='black';
  oc2.save();oc2.scale(S,S);oc2.translate(ox,oy);oc2.scale(sc,sc);
  oc2.fill(new Path2D(sel.p),'evenodd');
  oc2.restore();
  const id=oc2.getImageData(0,0,mW,mH);
  maskData=id.data;maskW=mW;maskH=mH;
}

function inside(px,py){
  if(!maskData)return false;
  const S=maskW/cv.width;
  const mx=Math.min(maskW-1,Math.max(0,Math.round(px*S)));
  const my=Math.min(maskH-1,Math.max(0,Math.round(py*S)));
  return maskData[(my*maskW+mx)*4]<128;
}
function initF(base){freqs=Array.from({length:cols},(_,i)=>base?base[i%base.length]*(0.88+Math.random()*0.24):0.25+Math.random()*0.75);}
function getColor(){if(clr!=='auto')return clr;return getComputedStyle(document.documentElement).getPropertyValue('--text').trim()||'#1a1814';}

function resize(){
  const W=cv.parentElement?cv.parentElement.clientWidth:720;
  cv.width=W;cv.height=320;
  buildMask();
}

function drawFrame(freeze){
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  if(!maskData)return;
  const pad=24,gridW=W-pad*2,gridH=H-pad*2;
  const colStep=gridW/cols,gap=Math.max(1.2,ds*0.42),dotStep=ds+gap;
  const rows=Math.floor(gridH/dotStep),fill=getColor(),r=ds/2;
  for(let c=0;c<cols;c++){
    let colH;
    if(freeze){
      colH=rows;
    } else {
      const speed=sp/5;
      const wave=Math.max(0.03,Math.min(1,
        Math.sin(t*speed+c*0.65)*0.5+0.5+
        Math.sin(t*speed*1.8+c*1.25)*0.2+
        Math.sin(t*speed*0.7+c*2.1)*0.08
      ));
      colH=wave*rows;
    }
    const dotX=pad+c*colStep+colStep/2;
    for(let row=0;row<rows;row++){
      const dotY=pad+row*dotStep+r;
      if(!inside(dotX,dotY))continue;
      const fromBot=rows-row,frac=fromBot/rows;
      const active=fromBot<=colH;
      ctx.globalAlpha=active?0.12+frac*0.88:0.07;
      ctx.fillStyle=fill;
      ctx.beginPath();ctx.arc(dotX,dotY,r,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.globalAlpha=1;
}

function draw(now){
  fpsF++;if(now-fpsT>=1000){document.getElementById('fps').textContent=fpsF+' fps';fpsF=0;fpsT=now;}
  if(!paused)t+=0.016;
  drawFrame(paused);
  requestAnimationFrame(draw);
}

function exportSVG(){
  const W=cv.width,H=cv.height;
  const pad=24,gridW=W-pad*2,gridH=H-pad*2;
  const colStep=gridW/cols,gap=Math.max(1.2,ds*0.42),dotStep=ds+gap;
  const rows=Math.floor(gridH/dotStep),r=ds/2;
  const fill=getColor();
  let circles='';
  for(let c=0;c<cols;c++){
    const dotX=pad+c*colStep+colStep/2;
    for(let row=0;row<rows;row++){
      const dotY=pad+row*dotStep+r;
      if(!inside(dotX,dotY))continue;
      const fromBot=rows-row,frac=fromBot/rows;
      const opacity=(0.12+frac*0.88).toFixed(3);
      circles+=`<circle cx="${dotX.toFixed(1)}" cy="${dotY.toFixed(1)}" r="${r.toFixed(1)}" fill="${fill}" opacity="${opacity}"/>`;
    }
  }
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${circles}</svg>`;
  const blob=new Blob([svg],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`dot-${sel.n}.svg`;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

document.getElementById('pauseBtn').onclick=()=>{
  paused=!paused;
  const btn=document.getElementById('pauseBtn');
  document.getElementById('pauseIcon').innerHTML=paused
    ?'<path d="M8 5v14l11-7z"/>'
    :'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  document.getElementById('pauseLabel').textContent=paused?'Resume':'Pause';
  btn.classList.toggle('paused',paused);
  if(paused)drawFrame(true);
};
document.getElementById('exportBtn').onclick=exportSVG;

document.getElementById('q').oninput=e=>{q=e.target.value;renderGrid();};
document.getElementById('iSp').oninput=e=>{sp=+e.target.value;document.getElementById('vSp').textContent=sp;};
document.getElementById('iDs').oninput=e=>{ds=+e.target.value;document.getElementById('vDs').textContent=ds;buildMask();};
document.getElementById('iCo').oninput=e=>{cols=+e.target.value;document.getElementById('vCo').textContent=cols;initF();};
document.getElementById('iCl').onchange=e=>{clr=e.target.value;};
window.addEventListener('resize',resize);
renderCats();renderGrid();renderPresets();updateBar();initF();
setTimeout(()=>{resize();requestAnimationFrame(draw);},100);
</script>
</body>
</html>
